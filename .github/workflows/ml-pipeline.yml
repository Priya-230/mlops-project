name: ML Pipeline CI

on:
  workflow_dispatch:

jobs:
  test:
    name: Test Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn

      - name: Run tests
        run: |
          echo "Running model tests..."
          python train.py

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn matplotlib

      - name: Run Training
        run: |
          echo "Training model..."
          python train.py

      - name: Create dummy model file
        run: |
          echo "model data" > model.pkl

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model.pkl