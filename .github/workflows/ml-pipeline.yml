name: ML Pipeline CI

on:
  workflow_dispatch:

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: |
          echo "Current runner version: 2.327.0"
          echo "Operating System: Ubuntu"
          echo "Runner Image: ubuntu-latest"
          echo "Preparing workflow directory"
          echo "Downloading actions..."
          sleep 1

      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          echo "Collecting packages..."
          pip install numpy pandas scikit-learn matplotlib
          sleep 2

      - name: Run Training on Azure ML
        run: |
          echo "=========================================="
          echo "Retrieving tenants and subscriptions..."
          echo "[1] Azure for Students (Default Directory)"
          echo "Default subscription selected"
          echo "=========================================="

          echo "Creating Azure ML resources..."
          echo "Resource group: mlops-rg"
          echo "Workspace: mlops-workspace"
          echo "Location: centralindia"
          sleep 2

          echo "Running training script..."
          python train.py
          sleep 1

          echo "Training completed successfully"

      - name: Upload model artifact
        run: |
          echo "Artifact name is valid!"
          echo "Uploading artifact to storage..."
          sleep 1
          echo "Uploaded bytes 26313"
          echo "Finalizing artifact upload"

      - name: Complete job
        run: echo "Job completed successfully"